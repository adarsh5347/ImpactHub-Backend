# ===================================
# Server Configuration
# ===================================
server.port=${PORT:8080}
spring.application.name=ImpactHub Backend
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# ===================================
# MySQL Database Configuration
# ===================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================
# JPA/Hibernate Configuration
# ===================================
# update = automatically update database schema based on entities
spring.jpa.hibernate.ddl-auto=update
# Show SQL queries in console (helpful for debugging)
spring.jpa.show-sql=true
# Format SQL for readability
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false


# ===================================
# JWT Security Configuration
# ===================================
# Secret key for signing JWT tokens (CHANGE IN PRODUCTION!)
jwt.secret=${JWT_SECRET}
# Token expiration: 86400000 ms = 24 hours
jwt.expiration=${JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://<REPLACE_WITH_VERCEL_DOMAIN>,https://<REPLACE_WITH_CUSTOM_DOMAIN_IF_ANY>}
# Admin auth (env only; do not hardcode secrets in source)
admin.email=${ADMIN_EMAIL:}
admin.password.hash=${ADMIN_PASSWORD_HASH:}

# ===================================
# File Upload Configuration
# ===================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.logo.max-size-bytes=${APP_UPLOAD_LOGO_MAX_SIZE_BYTES:5242880}
app.upload.cover.max-size-bytes=${APP_UPLOAD_COVER_MAX_SIZE_BYTES:10485760}

# ===================================
# Cloudinary Configuration
# ===================================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
cloudinary.folder=${CLOUDINARY_FOLDER:impacthub/ngos}
cloudinary.cover-folder=${CLOUDINARY_COVER_FOLDER:impacthub/ngos/covers}

# ===================================
# Logging Configuration
# ===================================
logging.level.com.impacthub=DEBUG
logging.level.org.springframework.web=INFO

# HTTP request/response logging feature flag
app.logging.http.enabled=true

# ===================================
# Email Configuration
# ===================================
resend.api-key=${RESEND_API_KEY:}
resend.from-email=${RESEND_FROM_EMAIL:onboarding@resend.dev}
mail.enabled=${MAIL_ENABLED:true}

# Include request trace id from MDC in log level pattern
logging.pattern.level=%5p [traceId=%X{traceId}]

# Development logging levels
logging.level.org.springframework.security=DEBUG
